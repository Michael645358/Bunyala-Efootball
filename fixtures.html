<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Fixtures</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Bunyala Efootball Gamers</h1>
    <p>Tournament Fixtures</p>

    <a href="index.html">
        <button>Home</button>
    </a>
</header>

<section>
    <h2>Current Fixtures</h2>
    <div id="fixturesList"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
"https://gwncuzcafdcorfenrqyr.supabase.co";

const SUPABASE_KEY =
"sb_publishable_EnMAhkA4dWpUuJYYdpizhg_VQ6CDG4z";

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function loadFixtures() {

    const { data, error } =
    await supabaseClient
    .from("fixtures")
    .select("*")
    .order("id");

    if(error){
        console.log(error);
        return;
    }

    let container =
    document.getElementById("fixturesList");

    container.innerHTML = "";

    if(data.length === 0){
        container.innerHTML =
        "<div class='card'>No fixtures available</div>";
        return;
    }

    data.forEach(fixture => {

        let card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML =
        fixture.player1 +
        " 🆚 " +
        fixture.player2;

        container.appendChild(card);

    });
}

loadFixtures();
</script>

</body>
</html>
