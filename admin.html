<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Admin Dashboard</h1>
    <p>Bunyala Efootball Gamers</p>

    <a href="index.html">
        <button>Home</button>
    </a>

    <br><br>

    <button onclick="logout()">
        Logout
    </button>
</header>

<section>
    <h2>Registered Players</h2>
    <div id="adminPlayers"></div>
</section>

<section>
    <h2>Create Tournament</h2>

    <input id="tournamentName"
           type="text"
           placeholder="Tournament Name">

    <br><br>

    <input id="entryFee"
           type="number"
           placeholder="Entry Fee">

    <br><br>

    <input id="prizePool"
           type="number"
           placeholder="Prize Pool">

    <br><br>

    <button onclick="createTournament()">
        Create Tournament
    </button>

    <p id="tournamentMessage"></p>

    <div id="tournamentsList"></div>
</section>

<section>
    <h2>Create Fixture</h2>

    <input id="player1"
           type="text"
           placeholder="Player 1">

    <br><br>

    <input id="player2"
           type="text"
           placeholder="Player 2">

    <br><br>

    <button onclick="createFixture()">
        Create Fixture
    </button>

    <div id="fixturesAdminList"></div>
</section><section>
    <h2>Match Results</h2>

    <input id="resultPlayer1"
           type="text"
           placeholder="Player 1">

    <br><br>

    <input id="resultPlayer2"
           type="text"
           placeholder="Player 2">

    <br><br>

    <input id="score1"
           type="number"
           placeholder="Score 1">

    <br><br>

    <input id="score2"
           type="number"
           placeholder="Score 2">

    <br><br>

    <input id="winner"
           type="text"
           placeholder="Winner">

    <br><br>

    <button onclick="addResult()">
        Save Result
    </button>

    <div id="resultsAdminList"></div>
</section>

<section>
    <h2>Leaderboard</h2>

    <input id="leaderboardUsername"
           type="text"
           placeholder="Username">

    <br><br>

    <input id="leaderboardPoints"
           type="number"
           placeholder="Points">

    <br><br>

    <button onclick="addLeaderboard()">
        Add Player
    </button>

    <div id="adminLeaderboardList"></div>
</section>

<section>
    <h2>Hall of Fame</h2>

    <input id="hofTournament"
           type="text"
           placeholder="Tournament Name">

    <br><br>

    <input id="hofChampion"
           type="text"
           placeholder="Champion">

    <br><br>

    <input id="hofYear"
           type="number"
           placeholder="Year">

    <br><br>

    <button onclick="addHallOfFame()">
        Add Champion
    </button>

    <div id="adminHallOfFameList"></div>
</section>

<section>
    <h2>Payments</h2>
    <div id="paymentsList"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
