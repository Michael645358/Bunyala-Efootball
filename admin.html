<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body><header class="hero">
    <h1>Admin Dashboard</h1>
    <p>Bunyala Efootball Gamers</p>

    <a href="index.html">
        <button>Home</button>
    </a>

    <br><br>

    <button onclick="logout()">
        Logout
    </button>
</header><section>
    <h2>Registered Players</h2>
    <div id="adminPlayers"></div>
</section><section>
    <h2>Create Tournament</h2>

    <input id="tournamentName"
           type="text"
           placeholder="Tournament Name">

    <br><br>

    <input id="entryFee"
           type="number"
           placeholder="Entry Fee">

    <br><br>

    <input id="prizePool"
           type="number"
           placeholder="Prize Pool">

    <br><br>

    <button onclick="createTournament()">
        Create Tournament
    </button>

    <p id="tournamentMessage"></p>

<div id="tournamentsList"></div>
</section>

<section>
    <h2>Create Fixture</h2>

    <input id="player1" type="text" placeholder="Player 1">

    <br><br>

    <input id="player2" type="text" placeholder="Player 2">

    <br><br>

    <button onclick="createFixture()">
        Create Fixture
    </button>

    <div id="fixturesAdminList"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
