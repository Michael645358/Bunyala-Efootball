<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Pesa Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>M-Pesa Registration</h1>

    <a href="index.html">
        <button>Home</button>
    </a>
</header>

<section>
    <h2>Pay Tournament Entry Fee</h2>

    <input id="mpesaName" type="text" placeholder="Full Name">

    <br><br>

    <input id="mpesaPhone" type="text" placeholder="Phone Number">

    <br><br>

    <input id="mpesaAmount" type="number" value="100">

    <br><br>

    <button onclick="initiatePayment()">
        Pay via M-Pesa
    </button>

    <p id="paymentMessage"></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="payment.js"></script>

</body>
</html>
