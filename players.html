<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profiles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Player Profiles</h1>

    <a href="index.html">
        <button>Home</button>
    </a>
</header>

<section>

    <h2>Create Profile</h2>

    <input id="username"
           type="text"
           placeholder="Username">

    <br><br>

    <input id="fullname"
           type="text"
           placeholder="Full Name">

    <br><br>

    <input id="club"
           type="text"
           placeholder="Favorite Club">

    <br><br>

    <input id="country"
           type="text"
           placeholder="Country">

    <br><br>

    <input id="rating"
           type="number"
           placeholder="Rating">

    <br><br>

    <input id="photo"
           type="text"
           placeholder="Photo URL">

    <br><br>

    <textarea id="bio"
              placeholder="Bio"></textarea>

    <br><br>

    <button onclick="saveProfile()">
        Save Profile
    </button>

</section>

<section>

    <h2>Players</h2>

    <div id="profilesList"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="players.js"></script>

</body>
</html>
